body{

/* 모든 TV화면 공통 효과 */

.tv-screen{

    position:absolute;

    overflow:hidden;

    cursor:pointer;

    transition:.2s;
    border-radius: 4px;
}

/* 영상 */

.tv-screen video{

    width:100%;
    height:100%;

    object-fit:cover;

    transition:.2s;
}

/* Hover 시 TV 오류 */

.tv-screen:hover{

    animation:glitch .08s infinite;
}

/* 영상 확대 */

.tv-screen:hover video{

    transform:scale(1.05);

    filter:
        contrast(1.2)
        brightness(1.1);
}

/* 노이즈 레이어 */

.glitch-noise{

    position:absolute;
    inset:0;

    opacity:0;

    pointer-events:none;

    background-image:url("gifs/glitch.gif");

    background-size:cover;

    mix-blend-mode:screen;
}

/* Hover 시 노이즈 등장 */

.tv-screen:hover .glitch-noise{

    opacity:10;

   
}

/* 흔들림 */

@keyframes flicker{

    0%{
        opacity:.2;
    }

    50%{
        opacity:.8;
    }

    100%{
        opacity:.2;
    }
}

@keyframes glitchFrames{

    0%{
        transform:translate(0);
    }

    20%{
        transform:translate(-4px,0);
    }

    40%{
        transform:translate(3px,0);
    }

    60%{
        transform:translate(-2px,2px);
    }

    80%{
        transform:translate(4px,-1px);
    }

    100%{
        transform:translate(0);
    }
}

.scanline{

    position:absolute;
    inset:0;

    pointer-events:none;

    background:

    repeating-linear-gradient(

        to bottom,

        rgba(180,220,255,.20) 0px,
        rgba(180,220,255,.20) 1px,

        rgba(120,180,255,.10) 1px,
        rgba(120,180,255,.10) 3px

    );

    mix-blend-mode:screen;

    opacity:.9;

    z-index:20;
}
</style>
