<!DOCTYPE html>
<html>
<style>
	html, section, body, h1, h2, p, footer, nav{margin: 0; padding: 0;
	}
@font-face {
    font-family: 'NeoDonggeunmo';
    src: url('https://cdn.jsdelivr.net/gh/projectnoonnu/noonfonts_2001@1.3/NeoDunggeunmo.woff') format('woff');
    font-weight: normal;
    font-display: swap;
}
html{
  font-family:'NeoDonggeunmo';
  font-optical-sizing:auto;
  font-weight:100;
  font-style:normal;
  word-break:keep-all;
  scroll-behavior: smooth;
}

.intro{
    height:100vh;

    position:relative;

    width:100%;


    background:black;

    overflow:hidden;

    display:flex;
    justify-content:center;
    align-items:center;
    text-align: center;

}
#blackout{

    position:fixed;
    inset:0;

    background:black;

    opacity:0;

    pointer-events:none;

    transition:.5s;

    z-index:9999;
}

#blackout.active{
    opacity:1;
}

.intro::after{

    content:"";

    position:absolute;
    inset:0;

    background:
    repeating-linear-gradient(
        to bottom,
        rgba(255,255,255,.08) 0px,
        rgba(255,255,255,.08) 2px,
        transparent 2px,
        transparent 8px
    );

    pointer-events:none;

    z-index:5;

}
.intro::before{

    content:"";

    position:absolute;

    inset:0;

    background:
    linear-gradient(
        transparent,
        rgba(255,255,255,.08),
        transparent
    );

    animation:scan 8s linear infinite;

    pointer-events:none;
}
.crt-text{

    position:relative;
z-index: 1;
}
.panel{

    position:absolute;
    inset:0;

    display:flex;
    justify-content:center;
    align-items:center;

    opacity:0;

    transition:0.5s;
}

.panel.active{

    opacity:1;
}

.crt-text{

    color:white;

    font-size:7rem;

    line-height:1.3;

    text-align:center;

    animation:flicker .15s infinite;
}
@keyframes flicker{

    0%{
        opacity:1;
    }

    50%{
        opacity:.92;
    }

    100%{
        opacity:1;
    }
}

@keyframes scan{

    from{
        transform:translateY(-100%);
    }

    to{
        transform:translateY(100%);
    }
}
.glitch{
    position:relative;
    color:white;
    z-index:10;

    text-shadow:
        0 0 8px rgba(255,255,255,.35);

    animation:flicker .15s infinite;
}

.glitch::before,
.glitch::after{

    content:attr(data-text);

    position:absolute;

    top:0;
    left:0;

    width:100%;
    height:100%;

    pointer-events:none;
}


.glitch::before{

    color:#ff2d55;

    opacity:.5;

    z-index:-1;

    animation:redShift 2s infinite;
}
.glitch::after{

    color:#00ffff;

    opacity:.5;

    z-index:-1;

    animation:blueShift 2s infinite;
}



.intro.crash::after{

    background:
    repeating-linear-gradient(
        to bottom,
        rgba(255,255,255,.25) 0px,
        rgba(255,255,255,.25) 3px,
        transparent 3px,
        transparent 6px
    );
}


@keyframes redGlitch{

    0%{transform:translateX(-3px);}
    50%{transform:translateX(2px);}
    100%{transform:translateX(-3px);}

}

@keyframes blueGlitch{

    0%{transform:translateX(3px);}
    50%{transform:translateX(-2px);}
    100%{transform:translateX(3px);}
}
@keyframes redShift{

    0%,85%,100%{
        transform:translateX(0);
    }

    86%{
        transform:translateX(-12px);
    }

    88%{
        transform:translateX(6px);
    }

    90%{
        transform:translateX(-4px);
    }
}

@keyframes blueShift{

    0%,85%,100%{
        transform:translateX(0);
    }

    86%{
        transform:translateX(12px);
    }

    88%{
        transform:translateX(-6px);
    }

    90%{
        transform:translateX(4px);
    }
}
@keyframes glitch{

    0%{
        transform:translate(0);
    }

    20%{
        transform:translate(-2px,1px);
    }

    40%{
        transform:translate(2px,-1px);
    }

    60%{
        transform:translate(-1px,2px);
    }

    80%{
        transform:translate(2px,1px);
    }

    100%{
        transform:translate(0);
    }
}
#world{
    transition:1s;
}



#rewindNav{
    position:fixed;
    top:20px;
    left:20px;
    z-index:9999;
}

#rewindBtn{
    background:none;
    border:none;

    color:white;
    font-family:'NeoDonggeunmo';
    font-size:1rem;

    cursor:pointer;

    opacity:.5;
    transition:.3s;
}

#rewindBtn:hover{
    opacity:1;
}

</style>

<head>
	<meta charset="utf-8">
	<meta name="viewport" content="width=device-width, initial-scale=1">
	

</head>


<nav id="rewindNav">
    <button id="rewindBtn">|◀◀ REWIND</button>
</nav>


<body>

<div id="blackout"></div>

<section class="intro">

    <div class="panel active">
        <h1 class="crt-text">당신은<br>주인공이세요!</h1>
    </div>

    <div class="panel">
        <h1 class="crt-text">축하합니다!</h1>
    </div>

    <div class="panel">
        <h1 class="crt-text">왜냐구요?</h1>
    </div>

    <div class="panel">
        <h1 class="crt-text">그야,<br>주인공은 죽지 않으니까.</h1>
    </div>

    <div class="panel">
        <h1 class="crt-text glitch" data-text="절대로.">
            절대로.
        </h1>
    </div>

</section>

<script>

const panels = document.querySelectorAll(".panel");
const intro = document.querySelector(".intro");
const blackout = document.getElementById("blackout");
const glitchText = document.querySelector(".glitch");

let current = 0;
let lock = false;
let crashed = false;

window.addEventListener("wheel",(e)=>{

    e.preventDefault();

    if(lock) return;

    lock = true;

    if(e.deltaY > 0){

        if(current < panels.length - 1){

            panels[current].classList.remove("active");

            current++;

            panels[current].classList.add("active");
        }

        else if(!crashed){

            crashed = true;

            glitchText.style.animation =
                "flicker .15s infinite, glitch .05s infinite";

            intro.classList.add("crash");

            blackout.classList.add("active");

            setTimeout(()=>{

                window.location.href = "tv.html";

            },700);
        }
    }

    else{

        if(current > 0){

            panels[current].classList.remove("active");

            current--;

            panels[current].classList.add("active");
        }
    }

    setTimeout(()=>{
        lock = false;
    },500);

},{ passive:false });

</script>

</body>

	






</html>
